<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防红链接生成器</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#080818; --panel:#10102a; --card:#141430;
      --border:rgba(100,108,255,.18); --primary:#6366f1; --purple:#a855f7;
      --green:#22d3a5; --text:#e2e8f0; --muted:#8892a4; --danger:#f87171;
    }
    body { background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif;
      min-height:100vh; }

    /* 顶栏 */
    header { background:rgba(16,16,42,.9); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border); padding:0 24px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:17px; }
    .logo-icon { width:32px; height:32px;
      background:linear-gradient(135deg,var(--primary),var(--purple));
      border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .badge { background:rgba(100,108,255,.15); color:var(--primary);
      border:1px solid rgba(100,108,255,.3); border-radius:6px;
      padding:2px 8px; font-size:11px; font-weight:600; }

    /* 主内容 */
    .wrap { max-width:680px; margin:0 auto; padding:32px 20px 80px; }

    /* 卡片 */
    .card { background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:28px; margin-bottom:20px; }
    .card-title { font-size:16px; font-weight:700; margin-bottom:4px; }
    .card-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }

    /* 表单 */
    .fg { margin-bottom:16px; }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:500; }
    input, textarea, select {
      width:100%; background:rgba(255,255,255,.04);
      border:1px solid var(--border); border-radius:10px;
      padding:10px 14px; color:var(--text); font-size:14px;
      outline:none; transition:border-color .2s; font-family:inherit; }
    input:focus, textarea:focus { border-color:var(--primary); background:rgba(99,102,241,.06); }
    textarea { resize:vertical; min-height:72px; }

    /* 收起/展开 OG 设置 */
    .toggle-btn {
      display:flex; align-items:center; gap:6px;
      background:none; border:1px dashed var(--border); border-radius:8px;
      color:var(--muted); font-size:13px; padding:8px 14px; cursor:pointer; width:100%;
      transition:all .2s; margin-bottom:16px; }
    .toggle-btn:hover { border-color:var(--primary); color:var(--primary); }
    .toggle-icon { transition:transform .2s; }
    .toggle-icon.open { transform:rotate(180deg); }
    .og-fields { display:none; }
    .og-fields.show { display:block; }

    /* 按钮 */
    .btn { display:flex; align-items:center; justify-content:center; gap:8px;
      padding:12px 20px; border-radius:10px; border:none; font-size:15px;
      font-weight:600; cursor:pointer; transition:all .2s; width:100%; }
    .btn-primary { background:linear-gradient(135deg,var(--primary),var(--purple));
      color:#fff; box-shadow:0 4px 18px rgba(99,102,241,.35); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(99,102,241,.5); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* 结果区 */
    .result-section { display:none; margin-top:20px; }
    .result-section.show { display:block; }

    .link-row { display:flex; align-items:stretch; gap:0; margin-bottom:10px; }
    .link-label {
      background:rgba(99,102,241,.1); border:1px solid var(--border);
      border-right:none; border-radius:10px 0 0 10px;
      padding:10px 14px; font-size:12px; font-weight:700;
      color:var(--primary); white-space:nowrap;
      display:flex; align-items:center; }
    .link-val {
      flex:1; background:rgba(0,0,0,.2); border:1px solid var(--border);
      border-radius:0; padding:10px 14px; font-size:13px; word-break:break-all;
      font-family:'Menlo','Courier New',monospace; color:var(--text); }
    .copy-btn {
      background:rgba(34,211,165,.1); border:1px solid rgba(34,211,165,.25);
      border-left:none; border-radius:0 10px 10px 0; color:var(--green);
      font-size:12px; font-weight:600; padding:10px 14px; cursor:pointer;
      white-space:nowrap; transition:all .15s; }
    .copy-btn:hover { background:rgba(34,211,165,.2); }

    /* 历史 */
    .hist-item { display:flex; align-items:center; gap:12px; padding:12px;
      background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:10px; margin-bottom:8px; }
    .hist-info { flex:1; min-width:0; }
    .hist-target { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hist-time { font-size:11px; color:var(--muted); margin-top:2px; }
    .hist-links { display:flex; flex-direction:column; gap:4px; margin-top:6px; }
    .hist-link-row { display:flex; gap:6px; align-items:center; }
    .hist-tag { font-size:11px; background:rgba(99,102,241,.12); color:#a5b4fc;
      border-radius:4px; padding:2px 6px; white-space:nowrap; }
    .hist-url { font-size:11px; color:var(--muted); font-family:monospace;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .hi-btn { background:rgba(99,102,241,.12); color:#a5b4fc; border:none;
      border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; }
    .hi-btn:hover { background:rgba(99,102,241,.22); }
    .hi-btn.del { background:rgba(248,113,113,.1); color:var(--danger); }
    .hi-btn.del:hover { background:rgba(248,113,113,.2); }

    .empty-hint { text-align:center; color:var(--muted); font-size:13px; padding:24px; }

    /* 加载中 */
    .spin {
      width:18px; height:18px; border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    #toast { position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:rgba(34,211,165,.95); color:#000; font-weight:600;
      font-size:14px; padding:10px 22px; border-radius:99px;
      pointer-events:none; transition:transform .3s, opacity .3s;
      opacity:0; z-index:999; }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <span>防红链接生成器</span>
    <span class="badge">v2.0</span>
  </div>
  <div style="font-size:13px;color:var(--muted)">微信/QQ/FB/WA/TG 全平台</div>
</header>

<div class="wrap">

  <!-- 生成卡片 -->
  <div class="card">
    <div class="card-title">⚡ 生成防红短链</div>
    <div class="card-sub">国内用 github.io 入口（微信白名单）· 海外用 Worker 短链（自定义预览卡）</div>

    <div class="fg">
      <label>目标 URL（真实跳转地址）</label>
      <input id="target-url" type="url" placeholder="https://example.com/your-page">
    </div>

    <!-- OG 自定义（收起状态） -->
    <button class="toggle-btn" id="og-toggle" onclick="toggleOG()">
      <span class="toggle-icon" id="og-icon">▼</span>
      自定义海外预览卡（标题 / 描述 / 图片）— 可选
    </button>
    <div class="og-fields" id="og-fields">
      <div class="fg">
        <label>预览标题（Facebook/WhatsApp/Telegram 看到的）</label>
        <input id="og-title" placeholder="2025全球商业趋势报告">
      </div>
      <div class="fg">
        <label>预览描述</label>
        <textarea id="og-desc" rows="2" placeholder="深度解析全球市场格局，助力企业把握先机…"></textarea>
      </div>
      <div class="fg">
        <label>预览图片 URL（建议 1200×630）</label>
        <input id="og-img" placeholder="https://images.unsplash.com/photo-xxx?w=1200&h=630">
      </div>
    </div>

    <button class="btn btn-primary" id="gen-btn" onclick="generate()">
      ⚡ 生成短链
    </button>

    <!-- 结果 -->
    <div class="result-section" id="result">
      <div style="font-size:13px;color:var(--green);font-weight:600;margin-bottom:12px;">✅ 短链已生成</div>

      <div class="link-row">
        <div class="link-label">🇨🇳 国内</div>
        <div class="link-val" id="link-domestic">—</div>
        <button class="copy-btn" onclick="copyEl('link-domestic')">复制</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;padding-left:4px;">
        ↑ 发到微信/QQ，github.io 白名单，微信爬虫看正常内容不封
      </div>

      <div class="link-row">
        <div class="link-label">🌍 海外</div>
        <div class="link-val" id="link-overseas">—</div>
        <button class="copy-btn" onclick="copyEl('link-overseas')">复制</button>
      </div>
      <div style="font-size:12px;color:var(--muted);padding-left:4px;">
        ↑ 发到 Facebook/WhatsApp/Telegram，自定义预览卡片
      </div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div class="card-title">📋 历史记录</div>
      <button onclick="clearHistory()"
        style="background:rgba(248,113,113,.1);color:var(--danger);border:none;
               border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">
        清空
      </button>
    </div>
    <div class="card-sub">最近生成的链接（本地保存，不上传）</div>
    <div id="hist-list"></div>
  </div>

</div>

<div id="toast">✅ 已复制</div>

<script>
var WORKER  = 'https://fanghong.hdvfyhvz792.workers.dev';
var GH_BASE = 'https://pwaw2a.github.io/go';
var HIST_KEY = 'fh_history_v2';

// ─── OG 折叠 ──────────────────────────────────────────────────
function toggleOG() {
  var fields = document.getElementById('og-fields');
  var icon   = document.getElementById('og-icon');
  var open   = fields.classList.toggle('show');
  icon.classList.toggle('open', open);
}

// ─── 生成链接 ─────────────────────────────────────────────────
async function generate() {
  var url   = document.getElementById('target-url').value.trim();
  var title = document.getElementById('og-title').value.trim();
  var desc  = document.getElementById('og-desc').value.trim();
  var img   = document.getElementById('og-img').value.trim();

  if (!url) { alert('请输入目标 URL'); return; }
  if (!/^https?:\/\//i.test(url)) { alert('URL 需以 https:// 或 http:// 开头'); return; }

  var btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 生成中…';

  try {
    var res = await fetch(WORKER + '/api/create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, title, desc, img})
    });
    var data = await res.json();

    if (!data.code) throw new Error(data.error || '未知错误');

    var domestic = GH_BASE + '/?c=' + data.code;
    var overseas = WORKER  + '/r/' + data.code;

    document.getElementById('link-domestic').textContent = domestic;
    document.getElementById('link-overseas').textContent = overseas;
    document.getElementById('result').classList.add('show');

    addHistory({url, title, code: data.code, domestic, overseas});
  } catch(e) {
    alert('生成失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⚡ 生成短链';
  }
}

// ─── 复制 ──────────────────────────────────────────────────────
function copyEl(id) {
  var text = document.getElementById(id).textContent;
  if (text === '—') return;
  navigator.clipboard.writeText(text).then(showToast);
}
function copyText(t) { navigator.clipboard.writeText(t).then(showToast); }
function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// ─── 历史 ──────────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
  catch(e) { return []; }
}
function saveHistory(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h)); }

function addHistory(item) {
  item.time = Date.now();
  var h = getHistory();
  h.unshift(item);
  if (h.length > 30) h = h.slice(0, 30);
  saveHistory(h);
  renderHistory();
}

function renderHistory() {
  var h   = getHistory();
  var box = document.getElementById('hist-list');
  if (!h.length) {
    box.innerHTML = '<div class="empty-hint">暂无记录</div>';
    return;
  }
  box.innerHTML = h.map(function(item, i) {
    var d = new Date(item.time);
    var t = (d.getMonth()+1)+'/'+d.getDate()+' '
          + String(d.getHours()).padStart(2,'0')+':'
          + String(d.getMinutes()).padStart(2,'0');
    return '<div class="hist-item">'
      + '<div class="hist-info">'
      + '<div class="hist-target">' + esc(item.url) + '</div>'
      + '<div class="hist-time">' + t + (item.title?' · '+esc(item.title):'') + '</div>'
      + '<div class="hist-links">'
      + '<div class="hist-link-row"><span class="hist-tag">🇨🇳</span>'
      + '<span class="hist-url">'+esc(item.domestic||'')+'</span>'
      + '<button class="hi-btn" onclick="copyText(\''+escAttr(item.domestic||'')+'\')">复制</button></div>'
      + '<div class="hist-link-row"><span class="hist-tag">🌍</span>'
      + '<span class="hist-url">'+esc(item.overseas||'')+'</span>'
      + '<button class="hi-btn" onclick="copyText(\''+escAttr(item.overseas||'')+'\')">复制</button></div>'
      + '</div></div>'
      + '<button class="hi-btn del" onclick="delHistory('+i+')">删除</button>'
      + '</div>';
  }).join('');
}

function delHistory(i) { var h=getHistory(); h.splice(i,1); saveHistory(h); renderHistory(); }
function clearHistory() { if(confirm('确定清空？')){ saveHistory([]); renderHistory(); } }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'"); }

renderHistory();
</script>
</body>
</html>
